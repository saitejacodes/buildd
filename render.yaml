services:
  - type: web
    name: visa-direct-agent
    env: python
    rootDir: visa_direct_agent
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: GROQ_API_KEY
        sync: false
